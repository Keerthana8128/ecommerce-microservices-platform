# Server
server.port=8080

# ---------------------------
# DB (Docker-compose overrides these with ENV)
# Default is H2 for local run
# ---------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/orderdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# H2 Console (works for local H2 runs)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Make Hibernate use modern MySQL dialect automatically (usually not required)
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---------------------------
# JWT (keep your existing values if you already have them)
# ---------------------------
# If you already have jwt.secret & jwt.expiration in your project, keep yours.
# Example placeholders:
jwt.secret=change-this-to-a-strong-secret-key-32-chars-min
jwt.expirationMs=86400000